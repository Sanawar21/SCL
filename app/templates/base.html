<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCL Auction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">SCL Auction</div>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav id="mainNav">
      <a href="{{ url_for('viewer.home') }}">Home</a>
      <a href="{{ url_for('viewer.live_view') }}">Live</a>
      <a href="{{ url_for('fantasy.fantasy_home') }}">Fantasy</a>
      <a href="{{ url_for('manager.login_page') }}">Manager</a>
      <a href="{{ url_for('unified_admin.admin_login_page') }}">Admin</a>
    </nav>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <section class="flash-wrap">
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
      </section>
    {% endif %}
  {% endwith %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
  <script>
    (function () {
      var toggle = document.getElementById('navToggle');
      var nav    = document.getElementById('mainNav');
      if (!toggle || !nav) return;
      toggle.addEventListener('click', function () {
        var open = nav.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();
  </script>
</body>
</html>
