{% extends 'fantasy_base.html' %}
{% block title %}Fantasy Admin Login — SCL{% endblock %}
{% block content %}
<section class="card form-card">
  <h2>Fantasy Admin Login</h2>
  <form method="post" action="{{ url_for('fantasy.fantasy_admin_login') }}">
    <label>Username</label>
    <input name="username" required>
    <label>Password</label>
    <input type="password" name="password" required>
    <button class="btn" type="submit">Login</button>
  </form>
</section>
{% endblock %}
